name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install quality dependencies
        run: python -m pip install -e ".[test]"
      - name: Run core tests with branch coverage
        run: python -m coverage run -m unittest discover -s tests -v
      - name: Enforce core coverage baseline
        run: python -m coverage report
      - name: Scan tracked files for secret signatures
        run: python tools/secret_scan.py

  framework-spikes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install isolated spike dependencies
        run: python -m pip install -e ".[test]" -r spikes/requirements-langgraph.txt -r spikes/requirements-pydantic-ai.txt
      - name: Run framework spikes and optional workflow coverage
        run: PYTHONPATH=src:spikes LANGGRAPH_STRICT_MSGPACK=true python -m coverage run --branch --source=asef --omit="src/asef/legacy/*" -m unittest -v spikes/test_langgraph_spike.py spikes/test_pydantic_ai_spike.py tests/test_human_checkpoint.py tests/test_human_workflow.py
      - name: Enforce optional workflow coverage baseline
        run: python -m coverage report --include="*/langgraph_checkpoint.py,*/human_decision.py" --fail-under=85

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run Docker integration tests
        run: PYTHONPATH=src ASEF_RUN_DOCKER_TESTS=1 python -m unittest discover -s tests/integration -v
      - name: Install the public package
        run: python -m pip install .
      - name: Run keyless demo outside the checkout
        run: |
          mkdir -p "$RUNNER_TEMP/asef-clean"
          cd "$RUNNER_TEMP/asef-clean"
          env -u OPENAI_API_KEY asef run
          python "$GITHUB_WORKSPACE/tools/secret_scan.py" .asef
