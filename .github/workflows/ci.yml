name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install quality dependencies
        run: python -m pip install -e ".[test]"
      - name: Run core tests with branch coverage
        run: python -m coverage run -m unittest discover -s tests -v
      - name: Enforce core coverage baseline
        run: python -m coverage report
      - name: Scan tracked files for secret signatures
        run: python tools/secret_scan.py

  framework-spikes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install isolated spike dependencies
        run: python -m pip install -e ".[test]" -r spikes/requirements-langgraph.txt -r spikes/requirements-pydantic-ai.txt
      - name: Run framework spikes and optional workflow coverage
        run: PYTHONPATH=src:spikes LANGGRAPH_STRICT_MSGPACK=true python -m coverage run --branch --source=asef --omit="src/asef/legacy/*" -m unittest -v spikes/test_langgraph_spike.py spikes/test_pydantic_ai_spike.py tests/test_human_checkpoint.py tests/test_human_workflow.py
      - name: Enforce optional workflow coverage baseline
        run: python -m coverage report --include="*/langgraph_checkpoint.py,*/human_decision.py" --fail-under=85

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build pinned pytest tool image
        run: docker build --tag asef/python-pytest:8.3.3 tooling/python-pytest
      - name: Run Docker integration tests
        run: PYTHONPATH=src ASEF_RUN_DOCKER_TESTS=1 python -m unittest discover -s tests/integration -v
      - name: Install the public package
        run: python -m pip install .
      - name: Run keyless demo outside the checkout
        run: |
          mkdir -p "$RUNNER_TEMP/asef-clean"
          cd "$RUNNER_TEMP/asef-clean"
          env -u OPENAI_API_KEY asef run
          python "$GITHUB_WORKSPACE/tools/secret_scan.py" .asef

  alpha-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install the public package
        run: python -m pip install .
      - name: Build pinned pytest tool image
        run: docker build --tag asef/python-pytest:8.3.3 tooling/python-pytest
      - name: Run deterministic keyless Alpha Smoke Dataset twice
        run: env -u OPENAI_API_KEY asef smoke --dataset-root datasets/smoke --context examples/context/python-alpha-smoke-context.json --output .asef/smoke --repeat 2
      - name: Validate aggregate Smoke report
        run: python -c "import glob,json,pathlib; p=glob.glob('.asef/smoke/*/suite.json'); assert len(p)==1, p; d=json.loads(pathlib.Path(p[0]).read_text()); assert (d['total'],d['matched'],d['mismatched'],d['runner_errors'])==(20,20,0,0), d"
      - name: Scan Smoke evidence for secret signatures
        run: python tools/secret_scan.py .asef/smoke
      - name: Publish sanitized Smoke reports
        uses: actions/upload-artifact@v7
        with:
          name: alpha-smoke-reports
          path: |
            .asef/smoke/*/suite.json
            .asef/smoke/*/suite.md
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  quality-capabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install the public package
        run: python -m pip install .
      - name: Build pinned quality tool image
        run: docker build --tag asef/python-quality:coverage-7.10.7-mutmut-3.6.0 tooling/python-quality
      - name: Run bounded quality conformance and reference integration
        run: env -u OPENAI_API_KEY PYTHONPATH=src ASEF_RUN_DOCKER_TESTS=1 ASEF_RUN_QUALITY_DOCKER_TESTS=1 ASEF_KEEP_QUALITY_EVIDENCE=1 python -m unittest discover -s tests/integration -p 'test_quality*.py' -v
      - name: Run quality contracts, failure and timeout tests
        run: PYTHONPATH=src python -m unittest discover -s tests -p 'test_quality*.py' -v
      - name: Scan retained quality evidence for secret signatures
        run: python tools/secret_scan.py .asef
      - name: Publish sanitized quality evidence
        uses: actions/upload-artifact@v7
        with:
          name: python-quality-evidence
          path: .asef/quality-evaluation-*/**/quality/**
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  alpha-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install the public package
        run: python -m pip install .
      - name: Build pinned pytest and quality images
        run: |
          docker build --tag asef/python-pytest:8.3.3 tooling/python-pytest
          docker build --tag asef/python-quality:coverage-7.10.7-mutmut-3.6.0 tooling/python-quality
      - name: Run keyless Security Dataset
        run: env -u OPENAI_API_KEY asef security --dataset-root datasets/security --output .asef/security
      - name: Validate Security report
        run: python -c "import glob,json,pathlib; p=glob.glob('.asef/security/*/suite.json'); assert len(p)==1,p; d=json.loads(pathlib.Path(p[0]).read_text()); assert (d['passed'],d['failed'],d['errors'],d['unsupported'])==(12,0,0,0),d"
      - name: Run installed environment doctor
        run: env -u OPENAI_API_KEY asef doctor --mode demo --output .asef/doctor
      - name: Validate doctor report
        run: python -c "import glob,json,pathlib; p=glob.glob('.asef/doctor/*/report.json'); assert len(p)==1,p; d=json.loads(pathlib.Path(p[0]).read_text()); s={x['check_id']:x['status'] for x in d['checks']}; assert d['healthy'] and d['status']=='DEGRADED',d; assert s['context']=='SKIP' and s['live-key-presence']=='SKIP',s; assert all(v=='PASS' for k,v in s.items() if k not in {'context','live-key-presence'}),s"
      - name: Prove Linux symlink and recursive cleanup
        run: ASEF_RUN_SECURITY_CLEANUP_TESTS=1 python -m unittest discover -s tests/integration -p 'test_cleanup_linux.py' -v
      - name: Validate installed cleanup dry-run and apply
        run: python tools/ci_cleanup_validation.py --artifact-output .asef/maintenance/cleanup
      - name: Verify no managed containers remain
        run: test -z "$(docker ps --no-trunc -aq --filter label=com.asef.managed=true)"
      - name: Scan security maintenance evidence
        run: python tools/secret_scan.py .asef/security .asef/doctor .asef/maintenance/cleanup .asef/logs
      - name: Publish sanitized security maintenance reports
        uses: actions/upload-artifact@v7
        with:
          name: alpha-security-reports
          path: |
            .asef/security/*/suite.json
            .asef/security/*/suite.md
            .asef/doctor/*/report.json
            .asef/doctor/*/report.md
            .asef/maintenance/cleanup/*.json
            .asef/maintenance/cleanup/*.md
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
