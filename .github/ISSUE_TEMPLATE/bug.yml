name: Bug
description: Relatar comportamento reproduzível do ASEF
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reprodução sanitizada
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidências e ambiente
  - type: checkboxes
    id: safety
    attributes:
      label: Segurança
      options:
        - label: Confirmei que o relato não contém secrets ou dados internos.
          required: true
